<div class="min-h-screen bg-gray-50">

  <!-- Top bar -->
  <div class="flex items-center justify-between px-4 py-3 bg-white shadow-sm">
    <button
      (click)="goBack()"
      class="flex items-center gap-1 text-gray-500 hover:text-gray-800"
    >
      <ng-icon name="heroArrowLeft" size="20"></ng-icon>
      <span class="text-sm font-medium">Back</span>
    </button>
    <span class="text-base font-bold text-gray-700">
      {{ homeTeam.team.name }} vs {{ awayTeam.team.name }}
    </span>
    <button
      (click)="confirmEnd()"
      class="flex items-center gap-1 bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-sm font-semibold"
    >
      <ng-icon name="heroCheckCircle" size="16"></ng-icon>
      End Game
    </button>
  </div>

  <!-- Score area -->
  <div class="flex justify-around items-start pt-4 px-2">
    <app-score [team]="homeTeam"></app-score>
    <app-score [team]="awayTeam" [reverseButtons]="true"></app-score>
  </div>

  <!-- Timer -->
  <div class="flex justify-center mt-4 px-4">
    <app-timer></app-timer>
  </div>

</div>

<!-- End Game Confirm Dialog -->
@if (showEndConfirm) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm text-center">
      <h2 class="text-xl font-bold text-gray-800 mb-1">End Game?</h2>
      <p class="text-gray-500 text-sm mb-2">Final score:</p>
      <p class="text-2xl font-extrabold text-blue-700 mb-6">
        {{ homeTeam.team.name }} {{ homeTeam.score }} – {{ awayTeam.score }} {{ awayTeam.team.name }}
      </p>
      <p class="text-xs text-gray-400 mb-4">Points will be allocated and standings updated.</p>
      <div class="flex gap-3">
        <button
          (click)="cancelEnd()"
          class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 rounded-lg"
        >
          Cancel
        </button>
        <button
          (click)="endGame()"
          class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg"
        >
          Confirm
        </button>
      </div>
    </div>
  </div>
}
